<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Landing Page de Alta Conversão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Preencha os dados abaixo</h2>
        
        <form id="leadForm">
            <!-- Campos Visíveis -->
            <input type="text" id="nome" name="nome" placeholder="Seu Nome completo" required>
            <input type="email" id="email" name="email" placeholder="Seu melhor E-mail" required>
            <input type="tel" id="whatsapp" name="whatsapp" placeholder="Seu WhatsApp (com DDD)" required>

            <!-- CAMPOS OCULTOS PARA RASTREAMENTO (O Segredo do Tráfego) -->
            <input type="hidden" id="utm_source" name="utm_source">
            <input type="hidden" id="utm_medium" name="utm_medium">
            <input type="hidden" id="utm_campaign" name="utm_campaign">
            <input type="hidden" id="fbclid" name="fbclid">
            <input type="hidden" id="gclid" name="gclid">

            <button type="submit">Enviar e Falar com a IA</button>
        </form>
    </div>

    <script>
        // 1. SCRIPT PARA CAPTURAR PARÂMETROS DA URL E JOGAR NOS INPUTS OCULTOS
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            const camposRastreamento = ['utm_source', 'utm_medium', 'utm_campaign', 'fbclid', 'gclid'];
            
            camposRastreamento.forEach(campo => {
                if (urlParams.has(campo)) {
                    document.getElementById(campo).value = urlParams.get(campo);
                }
            });
        });

        // 2. DISPARO DO FORMULÁRIO DIRETO PARA O WEBHOOK DO N8N VIA AJAX (FETCH)
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            // URL DO SEU WEBHOOK DE PRODUÇÃO DO N8N
            const N8N_WEBHOOK_URL = 'https://n8n.seudominio.com/webhook/seu-endpoint';

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Dados enviados com sucesso! A IA já vai te chamar.');
                    // Aqui você pode redirecionar para uma página de obrigado se quiser:
                    // window.location.href = '/obrigado.html';
                } else {
                    alert('Erro ao enviar dados. Tente novamente.');
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                alert('Erro de conexão.');
            }
        });
    </script>
</body>
</html>
